name: pr-autoclose

# Mirror the issue number from a PR title into the body as `Closes #N`, so merging
# the PR autocloses the linked issue. GitHub only autocloses from the PR body or a
# commit message — never from the title alone — so we copy the reference across.
on:
  pull_request:
    types: [opened, edited, reopened]

permissions:
  pull-requests: write

jobs:
  link-issue:
    # Fork PRs get a read-only token, so the update would 403 — skip them.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const title = pr.title || "";
            const body = pr.body || "";

            // Convention: the issue ref sits right after the `type(scope):` prefix,
            // e.g. `docs: closes #427 refresh inventories`. Take the first #N.
            const match = title.match(/#(\d+)/);
            if (!match) {
              core.info("No issue number in PR title; nothing to link.");
              return;
            }
            const issue = match[1];

            // Already closing this issue from the body? No-op. This guard also breaks
            // the edit->edit loop: our own body update re-fires `edited`, which no-ops.
            const alreadyLinked = new RegExp(
              `\\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\\s+#${issue}\\b`,
              "i",
            ).test(body);
            if (alreadyLinked) {
              core.info(`PR body already closes #${issue}.`);
              return;
            }

            const trimmed = body.trim();
            const newBody = trimmed.length ? `${trimmed}\n\nCloses #${issue}` : `Closes #${issue}`;
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              body: newBody,
            });
            core.info(`Linked PR #${pr.number} to issue #${issue}.`);
