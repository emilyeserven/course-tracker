name: Fallow Audit

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
  # Also guard the mainline so a merge can't slip an issue past the PR gate.
  push:
    branches: [master]

jobs:
  fallow-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # Dependency analysis needs node_modules to map script binaries to
      # packages (e.g. dotenv -> dotenv-cli) and resolve the shared eslint
      # config's plugins; without it those get flagged as unused.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Whole-codebase analysis (dead code + duplication + complexity), not just
      # changed files, and fail the build on any error-severity finding. The
      # full report is written to the job summary for visibility.
      - name: Run full fallow audit (gate on all findings)
        shell: bash
        run: |
          set -o pipefail
          pnpm exec fallow --fail-on-issues --format markdown --quiet \
            | tee -a "$GITHUB_STEP_SUMMARY"
