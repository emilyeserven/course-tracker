name: Fallow Audit

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  fallow-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history so the action can diff against the PR base ref
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # Dependency analysis needs node_modules to map script binaries to
      # packages (e.g. dotenv -> dotenv-cli) and resolve the shared eslint
      # config's plugins; without it those get flagged as unused.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run fallow audit
        uses: fallow-rs/fallow@v2
        with:
          command: audit
          # Gate on every finding in changed files, not just ones the PR introduced
          gate: all
          comment: true
